<div class="home-layout">
  <button class="hamburger-btn" (click)="toggleMenu()" [class.active]="isMenuOpen">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <aside class="sidebar" [class.open]="isMenuOpen">
    <img src="img/ford.png" alt="Ford" class="sidebar-logo">

    <nav class="sidebar-nav">
      <button class="sidebar-btn" (click)="goToDashboard(); toggleMenu()">
        <i class="fa-solid fa-gauge"></i>
        <span>Dashboard</span>
      </button>
    </nav>

    <button class="sidebar-btn logout" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Sair</span>
    </button>
  </aside>

  <div class="home-main" (click)="isMenuOpen = false">
    <header class="home-header">
      <span class="header-title">Sistema de dados FORD</span>
    </header>

    <div class="home-body">
      <h1 class="welcome-heading">
        Seja bem-vindo{{ user ? ', ' + user.nome : '' }}!
      </h1>
      <p class="welcome-subtext">Acesse o painel de controle para visualizar os dados dos veículos</p>

      <img src="img/ranger.png" alt="Ford Ranger" class="hero-image">
    </div>
  </div>
</div>
