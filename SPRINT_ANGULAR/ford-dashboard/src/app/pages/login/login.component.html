<div class="login-page">
  <div class="left-side"></div>

  <div class="right-side">
    <div class="login-panel">
      <img src="img/ford.png" alt="Ford" class="panel-logo">
      <h2 class="login-title">Boas-vindas</h2>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="input-box">
          <label>Usuário</label>
          <input
            type="text"
            name="userName"
            placeholder="Insira seu usuário"
            [(ngModel)]="userName"
            required
          >
        </div>

        <div class="input-box">
          <label>Senha</label>
          <input
            type="password"
            name="password"
            placeholder="Insira sua senha"
            [(ngModel)]="password"
            required
          >
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="login-btn" type="submit" [disabled]="!loginForm.valid || loading">
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </div>
  </div>
</div>
